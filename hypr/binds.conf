# See https://wiki.hyprland.org/Configuring/Keywords/ for more
$mainMod = SUPER

# -- Applications --
bind = $mainMod, Return, exec, alacritty
bind = $mainMod, Print, exec, grim -t png -l 0
bind = $mainMod, W, killactive,
bind = $mainMod, M, exit,
bind = $mainMod, E, exec, thunar
bind = $mainMod, V, togglefloating,
bind = $mainMod, D, exec, wofi --show drun
bind = $mainMod, F, fullscreen

# -- Focus (arrow keys) --
bind = $mainMod, left,  movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up,    movefocus, u
bind = $mainMod, down,  movefocus, d

# -- Switch workspaces --
# FIX: Belgian AZERTY number row unshifted keysyms
bind = $mainMod, ampersand,   workspace, 1
bind = $mainMod, eacute,      workspace, 2
bind = $mainMod, quotedbl,    workspace, 3
bind = $mainMod, apostrophe,  workspace, 4
bind = $mainMod, parenleft,   workspace, 5
bind = $mainMod, section,     workspace, 6
bind = $mainMod, egrave,      workspace, 7
bind = $mainMod, exclam,      workspace, 8
bind = $mainMod, ccedilla,    workspace, 9
bind = $mainMod, agrave,      workspace, 10

# -- Move window to workspace --
bind = $mainMod SHIFT, ampersand,   movetoworkspace, 1
bind = $mainMod SHIFT, eacute,      movetoworkspace, 2
bind = $mainMod SHIFT, quotedbl,    movetoworkspace, 3
bind = $mainMod SHIFT, apostrophe,  movetoworkspace, 4
bind = $mainMod SHIFT, parenleft,   movetoworkspace, 5
bind = $mainMod SHIFT, section,     movetoworkspace, 6
bind = $mainMod SHIFT, egrave,      movetoworkspace, 7
bind = $mainMod SHIFT, exclam,      movetoworkspace, 8
bind = $mainMod SHIFT, ccedilla,    movetoworkspace, 9
bind = $mainMod SHIFT, agrave,      movetoworkspace, 10

# -- Special workspace (scratchpad) --
bind = $mainMod, S, togglespecialworkspace, magic
bind = $mainMod SHIFT, S, movetoworkspace, special:magic

# -- Scroll through workspaces --
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up,   workspace, e-1

# -- Move/resize with mouse --
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# -- Resize with ALT + arrows --
bind = ALT, left,  resizeactive, -50 0
bind = ALT, right, resizeactive,  50 0
bind = ALT, up,    resizeactive,  0 -50
bind = ALT, down,  resizeactive,  0  50

# -- Volume --
bind = , XF86AudioMute,        exec, pactl set-sink-mute @DEFAULT_SINK@ toggle
bind = , XF86AudioRaiseVolume, exec, pactl set-sink-volume @DEFAULT_SINK@ +5%
bind = , XF86AudioLowerVolume, exec, pactl set-sink-volume @DEFAULT_SINK@ -5%

# -- Brightness --
bind = , XF86MonBrightnessUp,   exec, brightnessctl set +5%
bind = , XF86MonBrightnessDown, exec, brightnessctl set 5%-
